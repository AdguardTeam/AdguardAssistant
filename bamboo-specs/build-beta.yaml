---
version: 2
plan:
  project-key: ADGEXT
  key: LEGASSBETASPECS
  name: legacy assistant - build beta

stages:
  - Build:
      manual: false
      final: false
      jobs:
        - Build

Build:
  key: BUILD
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            # 'set' should be added to the beginning of each script to ensure that it runs with the correct options.
            #  -e: Exit immediately if any command exits with a non-zero status (i.e., if a command fails).
            #  -x: Print each command to the terminal as it is executed, which is useful for debugging.
            set -ex

            # Fix mixed logs
            exec 2>&1

            export DOCKER_BUILDKIT=1

            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --target build-beta-output \
              --output type=local,dest=output \
              .
    - inject-variables:
        file: output/artifacts/build.txt
        scope: RESULT
        namespace: userscriptMeta
    - any-task:
        plugin-key: com.atlassian.bamboo.plugins.vcs:task.vcs.tagging
        configuration:
          selectedRepository: defaultRepository
          tagName: v${bamboo.userscriptMeta.version}-beta
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh output/artifacts/build.txt,output/artifacts/assistant.meta.js,output/artifacts/assistant.user.js"
  artifacts:
    - name: assistant.meta.js
      location: output/artifacts
      pattern: assistant.meta.js
      shared: true
      required: true
    - name: assistant.user.js
      location: output/artifacts
      pattern: assistant.user.js
      shared: true
      required: true
    - name: build.txt
      location: output/artifacts
      pattern: build.txt
      shared: true
      required: true
  requirements:
    - extension: 'true'

triggers: []

branches:
  create: manually
  delete: never
  link-to-jira: true

labels: []
other:
  concurrent-build-plugin: system-default
