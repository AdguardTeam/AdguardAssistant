---
version: 2
plan:
  project-key: ADGEXT
  key: LEGASSTESTSPECS
  name: legacy assistant - test

stages:
  - Test:
      manual: false
      final: false
      jobs:
        - Test

Test:
  key: TEST
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            # 'set' should be added to the beginning of each script to ensure that it runs with the correct options.
            #  -e: Exit immediately if any command exits with a non-zero status (i.e., if a command fails).
            #  -x: Print each command to the terminal as it is executed, which is useful for debugging.
            set -ex

            # Fix mixed logs
            exec 2>&1

            export DOCKER_BUILDKIT=1

            # Uses puppeteer-runner base image (has Chrome pre-installed).
            # --ignore-scripts is NOT passed so puppeteer postinstall can run inside Docker.
            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --target test-output \
              --output type=local,dest=output \
              .
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh output/artifacts/assistant.meta.js,output/artifacts/assistant.js,output/artifacts/assistant.user.js"
  artifacts:
    - name: assistant.meta.js
      location: output/artifacts
      pattern: assistant.meta.js
      shared: true
      required: true
    - name: assistant.js
      location: output/artifacts
      pattern: assistant.js
      shared: true
      required: true
    - name: assistant.user.js
      location: output/artifacts
      pattern: assistant.user.js
      shared: true
      required: true
  requirements:
    - extension: 'true'

branches:
  create: for-pull-request
  delete:
    after-deleted-days: '1'
    after-inactive-days: '5'
  link-to-jira: true

notifications: []
labels: []
other:
  concurrent-build-plugin: system-default
